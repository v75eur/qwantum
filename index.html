<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWANTUM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020208;color:#d0d0e0;font-family:system-ui,sans-serif;min-height:100vh}
header{text-align:center;padding:20px 16px 10px;border-bottom:1px solid #f0b90b}
.logo{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#f0b90b;letter-spacing:4px;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 10px #f0b90b,0 0 20px #f0b90b}50%{text-shadow:0 0 20px #f0b90b,0 0 40px #f0b90b,0 0 60px #f0b90b}}
.subtitle{color:#666;font-size:13px;margin-top:2px;letter-spacing:2px}
main{max-width:1100px;margin:16px auto;padding:0 12px}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.col{background:#0c0c1a;border-radius:12px;padding:16px;transition:all 0.3s}
.col:hover{transform:translateY(-2px)}
.col h3{font-size:16px;margin-bottom:6px;text-align:center}
.col .count{font-size:13px;margin-bottom:8px;text-align:center}.col .count b{font-size:18px}
.col.np{border:1px solid #6366f1;box-shadow:0 0 15px rgba(99,102,241,0.1)}.col.np h3{color:#6366f1}
.col.gt{border:1px solid #f0b90b;box-shadow:0 0 15px rgba(240,185,11,0.1)}.col.gt h3{color:#f0b90b}
.col.ya{border:1px solid #00d4aa;box-shadow:0 0 15px rgba(0,212,170,0.1)}.col.ya h3{color:#00d4aa}
.term{background:#000;border-radius:6px;padding:10px;font-size:11px;font-family:'Courier New',monospace;height:280px;overflow-y:auto;white-space:pre-wrap;line-height:1.3;margin-bottom:8px}
.term.np{border:1px solid #6366f1;color:#a5b4fc}
.term.gt{border:1px solid #f0b90b;color:#fde68a}
.term.ya{border:1px solid #00d4aa;color:#6ee7b7}
.term::-webkit-scrollbar{width:4px}.term::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
input[type=number]{width:100%;background:#1a1a2e;border:1px solid #333;color:#fff;padding:8px;border-radius:6px;font-size:12px;text-align:center;margin-bottom:6px}
.btns{display:flex;gap:4px}.btns button{flex:1;padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s}.btns button:hover{opacity:0.8}
.btn-csv{background:#22c55e;color:#000}.btn-del{background:#ef4444;color:#fff}
@media(max-width:700px){.row{grid-template-columns:1fr}.term{height:180px}.logo{font-size:22px}}
</style>
</head>
<body>
<header>
  <div class="logo">QWANTUM</div>
  <div class="subtitle">3 moteurs · DNS vérifié · Continu</div>
</header>
<main><div class="row" id="dash"></div></main>
<script>
var A='https://qwantum-api.onrender.com';
var M=['np','gt','y@'];
var N={np:'📦 np',gt:'🐙 gt','y@':'▶️ y@'};
var C={np:'np',gt:'gt','y@':'ya'};
var dash=document.getElementById('dash');
M.forEach(function(m){
  dash.innerHTML+='<div class="col '+C[m]+'"><h3>'+N[m]+'</h3><div class="count">DNS: <b id="c_'+m+'">0</b></div><div class="term '+C[m]+'" id="t_'+m+'"></div><input type="number" id="n_'+m+'" value="50" min="1" max="9999"><div class="btns"><button class="btn-csv" onclick="dl(\''+m+'\')">📥 CSV</button><button class="btn-del" onclick="clr(\''+m+'\')">🗑️</button></div></div>';
  new EventSource(A+'/live/'+m).onmessage=function(e){var t=document.getElementById('t_'+m);t.textContent+=e.data+'\n';t.scrollTop=t.scrollHeight;};
});
function ref(){M.forEach(function(m){fetch(A+'/stats/'+m).then(r=>r.json()).then(d=>{document.getElementById('c_'+m).textContent=d.dns||0});});}
ref();setInterval(ref,10000);
function dl(m){var n=parseInt(document.getElementById('n_'+m).value)||50;fetch(A+'/download/'+m+'?n='+n).then(r=>r.json()).then(d=>{if(d.emails.length){var c='email\n'+d.emails.join('\n');var b=new Blob([c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='qw_'+m+'.csv';a.click();}else{alert('Aucun');}});}
function clr(m){if(confirm('Vider '+m+'?')){fetch(A+'/clear/'+m).then(()=>ref());}}
</script>
</body>
</html>
