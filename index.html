<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QWANTUM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020208;color:#e0e0f0;font-family:system-ui,sans-serif;min-height:100vh;font-size:15px}
header{text-align:center;padding:18px 14px 10px;border-bottom:2px solid #f0b90b}
.logo{font-family:'Courier New',monospace;font-size:26px;font-weight:900;color:#f0b90b;line-height:1.4;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{text-shadow:0 0 10px #f0b90b}50%{text-shadow:0 0 30px #f0b90b,0 0 60px #f0b90b}}
.subtitle{color:#888;font-size:14px;margin-top:4px;letter-spacing:2px}
main{max-width:1100px;margin:14px auto;padding:0 10px}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.col{background:#0c0c1a;border-radius:12px;padding:14px}
.col h3{font-size:18px;margin-bottom:6px;text-align:center}
.col .counts{font-size:14px;margin-bottom:8px;text-align:center;line-height:1.8}
.col .counts b{font-size:20px}
.col.np{border:1px solid #6366f1}.col.np h3{color:#6366f1}
.col.gt{border:1px solid #f0b90b}.col.gt h3{color:#f0b90b}
.col.ya{border:1px solid #00d4aa}.col.ya h3{color:#00d4aa}
.term{background:#000;border-radius:6px;padding:10px;font-size:13px;font-family:monospace;height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.3;margin-bottom:8px}
.term.np{border:1px solid #6366f1;color:#a5b4fc}
.term.gt{border:1px solid #f0b90b;color:#fde68a}
.term.ya{border:1px solid #00d4aa;color:#6ee7b7}
input,select{width:100%;background:#1a1a2e;border:1px solid #444;color:#fff;padding:8px;border-radius:6px;font-size:14px;margin-bottom:5px}
.btns{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}.btns button{flex:1;min-width:45px;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.btn-l3{background:#6366f1;color:#fff}.btn-l4{background:#f0b90b;color:#000}.btn-l5{background:#22c55e;color:#000}.btn-del{background:#ef4444;color:#fff;min-width:30px}
@media(max-width:700px){.row{grid-template-columns:1fr}.term{height:150px}.logo{font-size:20px}}
</style>
</head>
<body>
<header>
  <div class="logo">QWANTUM</div>
  <div class="subtitle">L3 (DNS) · L4 (Catch-All) · L5 (SMTP Confirmé)</div>
</header>
<main><div class="row" id="dash"></div></main>
<script>
var A='https://qwantum-api.onrender.com';
var M=['np','gt','y@'];
var N={np:'📦 np',gt:'🐙 gt','y@':'▶️ y@'};
var C={np:'np',gt:'gt','y@':'ya'};
var dash=document.getElementById('dash');
M.forEach(function(m){
  dash.innerHTML+='<div class="col '+C[m]+'"><h3>'+N[m]+'</h3>'+
    '<div class="counts">🔍 L3: <b id="l3_'+m+'">0</b> | ⚡ L4: <b id="l4_'+m+'">0</b> | ✅ L5: <b id="l5_'+m+'">0</b></div>'+
    '<div class="term '+C[m]+'" id="t_'+m+'"></div>'+
    '<input type="text" id="filter_'+m+'" placeholder="Filtrer domaine (optionnel)">'+
    '<input type="number" id="n_'+m+'" value="50" min="1" max="9999">'+
    '<div class="btns">'+
      '<button class="btn-l3" onclick="dl(\''+m+'\',\'3\')">📥 L3</button>'+
      '<button class="btn-l4" onclick="dl(\''+m+'\',\'4\')">📥 L4</button>'+
      '<button class="btn-l5" onclick="dl(\''+m+'\',\'5\')">📥 L5</button>'+
      '<button class="btn-del" onclick="clr(\''+m+'\')">🗑️</button>'+
    '</div></div>';
  new EventSource(A+'/live/'+m).onmessage=function(e){var t=document.getElementById('t_'+m);t.textContent+=e.data+'\n';t.scrollTop=t.scrollHeight;};
});
function ref(){M.forEach(function(m){fetch(A+'/stats/'+m).then(r=>r.json()).then(d=>{
  document.getElementById('l3_'+m).textContent=d.L3||0;
  document.getElementById('l4_'+m).textContent=d.L4||0;
  document.getElementById('l5_'+m).textContent=d.L5||0;
});});}
ref();setInterval(ref,10000);
function dl(m,t){
  var n=parseInt(document.getElementById('n_'+m).value)||50;
  var filter=document.getElementById('filter_'+m).value.trim();
  fetch(A+'/download/'+m+'/'+t+'?n='+n).then(r=>r.json()).then(d=>{
    if(d.emails.length){
      var emails=d.emails;
      if(filter){emails=emails.filter(function(e){return e.toLowerCase().includes('@'+filter.toLowerCase());});}
      if(!emails.length){alert('Aucun après filtre');return;}
      var c='email\n'+emails.join('\n');
      var b=new Blob([c],{type:'text/csv'});
      var a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download='qw_'+m+'_L'+t+'.csv';a.click();
    }else{alert('Aucun');}
  });
}
function clr(m){if(confirm('Vider '+m+' ?')){fetch(A+'/clear/'+m).then(()=>ref());}}
</script>
</body>
</html>
